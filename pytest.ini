[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: mark a test as a unit test
    integration: mark a test as an integration test
    slow: mark a test as slow (skipped unless explicitly requested)
addopts = -v --cov=agentic_rag --cov-report=term --cov-report=html

env =
    OPENAI_API_KEY=openai_test_key_for_mocks
    ANTHROPIC_API_KEY=test_key_for_mocking
    DASHSCOPE_API_KEY=qwen_test_key_for_mocking

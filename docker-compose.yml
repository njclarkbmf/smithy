# ──────────────────────────────────────────────────────────────
# Base Docker Compose — shared across all environments
# ──────────────────────────────────────────────────────────────
services:
  agentic-rag:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    volumes:
      - lancedb_data:/app/data
    environment:
      - DB_PATH=/app/data/lancedb
      - LOG_LEVEL=INFO
    restart: unless-stopped

volumes:
  lancedb_data:
    driver: local

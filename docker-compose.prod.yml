# ──────────────────────────────────────────────────────────────
# Production overlay — multi-stage, security, resource limits
# ──────────────────────────────────────────────────────────────
services:
  agentic-rag:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      - LOG_LEVEL=WARNING
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /app/.cache:noexec,nosuid,size=200m
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
